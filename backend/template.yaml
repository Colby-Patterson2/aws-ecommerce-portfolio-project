AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ecommerce-demo backend - API Gateway + Lambda + DynamoDB

Parameters:
  FrontendOrigin:
    Type: String
    Default: '*'
    Description: Allowed frontend origin for API CORS. Use comma-separated values for multiple origins.
  CloudFrontDomainName:
    Type: String
    Default: d3ama07cq01ab6.cloudfront.net
    Description: CloudFront domain used to build product image URLs.
  ProductImageUploadsBucketName:
    Type: String
    Description: Globally unique S3 bucket name for raw uploaded product images.
  ProductImagesBucketName:
    Type: String
    Description: Globally unique S3 bucket name for optimized product images.

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        PRODUCTS_TABLE: !Ref ProductsTable
        CARTS_TABLE: !Ref CartsTable
        ORDERS_TABLE: !Ref OrdersTable
        FRONTEND_ORIGIN: !Ref FrontendOrigin

Resources:
  EcommerceApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowHeaders:
          - content-type
          - x-requested-with
          - authorization

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/app.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Events:
        GetProducts:
          Type: HttpApi
          Properties:
            ApiId: !Ref EcommerceApi
            Path: /products
            Method: GET
        GetProductById:
          Type: HttpApi
          Properties:
            ApiId: !Ref EcommerceApi
            Path: /products/{id}
            Method: GET
        GetCart:
          Type: HttpApi
          Properties:
            ApiId: !Ref EcommerceApi
            Path: /cart/{sessionId}
            Method: GET
        AddToCart:
          Type: HttpApi
          Properties:
            ApiId: !Ref EcommerceApi
            Path: /cart/{sessionId}
            Method: POST
        RemoveFromCart:
          Type: HttpApi
          Properties:
            ApiId: !Ref EcommerceApi
            Path: /cart/{sessionId}/{productId}
            Method: DELETE
        Checkout:
          Type: HttpApi
          Properties:
            ApiId: !Ref EcommerceApi
            Path: /checkout
            Method: POST
        GetOrderById:
          Type: HttpApi
          Properties:
            ApiId: !Ref EcommerceApi
            Path: /orders/{orderId}
            Method: GET

  ProductImageUploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ProductImageUploadsBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  ProductImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ProductImagesBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  SharpLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: ecommerce-demo-sharp
      Description: Sharp native dependency for image optimization
      ContentUri: layers/sharp
      CompatibleRuntimes:
        - nodejs22.x
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: nodejs22.x

  ImageOptimizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src/image-optimizer.handler
      Timeout: 30
      MemorySize: 1024
      Layers:
        - !Ref SharpLayer
      Environment:
        Variables:
          TARGET_BUCKET: !Ref ProductImagesBucket
          CLOUDFRONT_DOMAIN_NAME: !Ref CloudFrontDomainName
          PNG_COMPRESSION_LEVEL: '9'
          WEBP_QUALITY: '82'
          MAX_IMAGE_WIDTH: '1600'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
        - Statement:
            - Sid: ReadFromUploadBucket
              Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub arn:${AWS::Partition}:s3:::${ProductImageUploadsBucketName}/products/*
            - Sid: WriteToPublishBucket
              Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub arn:${AWS::Partition}:s3:::${ProductImagesBucketName}/products/*
      Events:
        OptimizeUploadedPng:
          Type: S3
          Properties:
            Bucket: !Ref ProductImageUploadsBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: products/
                  - Name: suffix
                    Value: .png

  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  CartsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH

Outputs:
  ApiBaseUrl:
    Description: Base URL for deployed API
    Value: !Sub https://${EcommerceApi}.execute-api.${AWS::Region}.amazonaws.com

  ProductsTableName:
    Value: !Ref ProductsTable

  CartsTableName:
    Value: !Ref CartsTable

  OrdersTableName:
    Value: !Ref OrdersTable

  ProductImageUploadBucketOutputName:
    Description: Upload source bucket for raw product images.
    Value: !Ref ProductImageUploadsBucket

  ProductImagesBucketOutputName:
    Description: CloudFront origin bucket for optimized product images.
    Value: !Ref ProductImagesBucket

  ProductImagesCloudFrontBaseUrl:
    Description: Base CloudFront URL used in product records.
    Value: !Sub https://${CloudFrontDomainName}